<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Activity Stats</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Mono:ital,wght@0,300;0,400;0,500;1,400&family=DM+Sans:wght@400;500;600;700&display=swap');

  :root {
    --bg: #080c10;
    --surface: #0e1318;
    --card: #131920;
    --card-hover: #171f28;
    --border: #1e2832;
    --border-bright: #2a3844;
    --text: #dce8f0;
    --muted: #5a7080;
    --dim: #3a5060;
    --accent: #4fa8d0;
    --run: #3dd68c;
    --cycle: #e8c547;
    --swim: #4fa8d0;
    --steps: #a78bfa;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding: 40px 16px 80px;
    line-height: 1.5;
    background-image:
      radial-gradient(ellipse 80% 40% at 50% -10%, rgba(79,168,208,0.05) 0%, transparent 60%);
  }

  .wrap { max-width: 860px; margin: 0 auto; }

  /* Nav */
  .nav {
    display: flex;
    gap: 6px;
    margin-bottom: 32px;
  }
  .nav a {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    text-decoration: none;
    padding: 6px 14px;
    border-radius: 6px;
    border: 1px solid var(--border);
    color: var(--muted);
    transition: all 0.12s;
  }
  .nav a:hover { border-color: var(--border-bright); color: var(--text); }
  .nav a.active { background: var(--card); border-color: var(--accent); color: var(--accent); }

  /* Header */
  header { margin-bottom: 32px; }
  h1 {
    font-size: 26px;
    font-weight: 700;
    letter-spacing: -0.03em;
  }
  h1 span { color: var(--accent); }
  .updated {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: var(--muted);
    margin-top: 6px;
  }
  .period {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: var(--dim);
    margin-top: 3px;
  }

  /* User cards */
  .cards { display: flex; flex-direction: column; gap: 16px; }

  .card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    overflow: hidden;
  }

  .card-header {
    padding: 16px 20px 14px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: baseline;
    gap: 10px;
  }
  .card-name {
    font-size: 17px;
    font-weight: 700;
    text-transform: capitalize;
    letter-spacing: -0.01em;
  }

  /* Stats grid */
  .stats-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    divide: horizontal;
  }

  .stat-block {
    padding: 18px 20px;
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    gap: 6px;
  }
  .stat-block:last-child { border-right: none; }

  .stat-icon {
    font-size: 18px;
    line-height: 1;
    margin-bottom: 2px;
  }
  .stat-label {
    font-size: 9px;
    font-weight: 600;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--muted);
    font-family: 'DM Mono', monospace;
  }
  .stat-value {
    font-size: 26px;
    font-weight: 700;
    line-height: 1;
    font-family: 'DM Mono', monospace;
    letter-spacing: -0.02em;
  }
  .stat-value.steps { color: var(--steps); }
  .stat-value.run   { color: var(--run); }
  .stat-value.cycle { color: var(--cycle); }
  .stat-value.swim  { color: var(--swim); }
  .stat-value.none  { color: var(--dim); }

  .stat-unit {
    font-size: 11px;
    color: var(--muted);
    margin-top: 2px;
  }
  .stat-sub {
    font-size: 11px;
    color: var(--dim);
    font-family: 'DM Mono', monospace;
  }

  footer {
    margin-top: 48px;
    text-align: center;
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: var(--dim);
    letter-spacing: 0.04em;
  }

  @media (max-width: 580px) {
    .stats-grid {
      grid-template-columns: repeat(2, 1fr);
    }
    .stat-block:nth-child(2) { border-right: none; }
    .stat-block:nth-child(1),
    .stat-block:nth-child(2) { border-bottom: 1px solid var(--border); }
    .stat-value { font-size: 22px; }
  }
</style>
</head>
<body>
<div class="wrap">
  <nav class="nav">
    <a href="index.html">Sleep</a>
    <a href="activities.html" class="active">Activity</a>
    <a href="history.html">History</a>
  </nav>

  <header>
    <h1>Weekly <span>Activity</span></h1>
    <div class="updated" id="updatedAt">Loading...</div>
    <div class="period" id="period"></div>
  </header>

  <div id="cards" class="cards"></div>

  <footer>Garmin Connect &middot; data updated manually</footer>
</div>

<script>
function fmt(val, decimals = 1) {
  if (val === null || val === undefined) return null;
  return decimals === 0 ? Math.round(val).toLocaleString() : val.toFixed(decimals);
}

function sessionLabel(n, type) {
  if (!n) return `no ${type}s`;
  return `${n} session${n === 1 ? '' : 's'}`;
}

function renderCard(u) {
  const steps = u.weekly_steps;
  const avgSteps = u.avg_daily_steps;
  const runKm = u.running_km;
  const cycleKm = u.cycling_km;
  const swimKm = u.swimming_km;

  function statBlock(icon, label, value, unit, sub, colorClass) {
    const displayVal = value !== null && value !== undefined && value !== 0
      ? value
      : null;
    return `
      <div class="stat-block">
        <div class="stat-icon">${icon}</div>
        <div class="stat-label">${label}</div>
        <div class="stat-value ${displayVal !== null ? colorClass : 'none'}">
          ${displayVal !== null ? displayVal : '--'}
        </div>
        <div class="stat-unit">${unit}</div>
        <div class="stat-sub">${sub}</div>
      </div>`;
  }

  const stepsDisplay = steps ? Math.round(steps).toLocaleString() : null;
  const avgDisplay = avgSteps ? Math.round(avgSteps).toLocaleString() + ' /day' : 'no data';

  return `
    <div class="card">
      <div class="card-header">
        <div class="card-name">${u.name}</div>
      </div>
      <div class="stats-grid">
        ${statBlock('👣', 'Steps', stepsDisplay, '7-day total', avgDisplay, 'steps')}
        ${statBlock('🏃', 'Running', runKm ? runKm.toFixed(1) : null, 'km this week', sessionLabel(u.running_sessions, 'run'), 'run')}
        ${statBlock('🚴', 'Cycling', cycleKm ? cycleKm.toFixed(1) : null, 'km this week', sessionLabel(u.cycling_sessions, 'ride'), 'cycle')}
        ${statBlock('🏊', 'Swimming', swimKm ? swimKm.toFixed(1) : null, 'km this week', sessionLabel(u.swimming_sessions, 'swim'), 'swim')}
      </div>
    </div>`;
}

function getPeriodLabel() {
  const today = new Date();
  const start = new Date(today);
  start.setDate(start.getDate() - 6);
  const fmt = d => d.toLocaleDateString(undefined, { month: 'short', day: 'numeric' });
  return `${fmt(start)} – ${fmt(today)}`;
}

async function load() {
  try {
    const res = await fetch('activities.json');
    if (!res.ok) throw new Error(`activities.json not found (${res.status})`);
    const data = await res.json();

    document.getElementById('updatedAt').textContent =
      data.updated_at ? `Updated ${data.updated_at.replace('T', ' ')}` : '';
    document.getElementById('period').textContent = getPeriodLabel();

    const users = data.users || [];
    if (users.length === 0) {
      document.getElementById('cards').innerHTML =
        `<div style="color:var(--muted);font-size:13px;padding:24px 0">No activity data yet.</div>`;
      return;
    }

    document.getElementById('cards').innerHTML = users.map(renderCard).join('');
  } catch (e) {
    document.getElementById('cards').innerHTML =
      `<div style="color:var(--muted);font-size:13px;padding:24px 0">Could not load activities.json: ${e.message}</div>`;
  }
}

load();
</script>
</body>
</html>
