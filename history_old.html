<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Sleep History</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Mono:ital,wght@0,300;0,400;0,500;1,400&family=DM+Sans:wght@400;500;600;700&display=swap');

  :root {
    --bg: #080c10;
    --surface: #0e1318;
    --card: #131920;
    --card-hover: #171f28;
    --border: #1e2832;
    --border-bright: #2a3844;
    --text: #dce8f0;
    --muted: #5a7080;
    --dim: #3a5060;
    --accent: #4fa8d0;
    --excellent: #3dd68c;
    --good: #8ccc30;
    --fair: #e8c547;
    --poor: #e05050;
    --deep: #5b6af0;
    --rem: #a060e0;
    --light: #30a8d8;
    --awake: #e05050;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding: 40px 16px 80px;
    line-height: 1.5;
    background-image: radial-gradient(ellipse 80% 40% at 50% -10%, rgba(79,168,208,0.05) 0%, transparent 60%);
  }

  .wrap { max-width: 860px; margin: 0 auto; }

  .nav { display: flex; gap: 6px; margin-bottom: 32px; }
  .nav a {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    text-decoration: none;
    padding: 6px 14px;
    border-radius: 6px;
    border: 1px solid var(--border);
    color: var(--muted);
    transition: all 0.12s;
  }
  .nav a:hover { border-color: var(--border-bright); color: var(--text); }
  .nav a.active { background: var(--card); border-color: var(--accent); color: var(--accent); }

  header { margin-bottom: 32px; }
  h1 { font-size: 26px; font-weight: 700; letter-spacing: -0.03em; }
  h1 span { color: var(--accent); }
  .updated { font-family: 'DM Mono', monospace; font-size: 11px; color: var(--muted); margin-top: 6px; }

  .cards { display: flex; flex-direction: column; gap: 16px; }

  .card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    overflow: hidden;
  }

  .card-header {
    padding: 14px 20px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .card-name {
    font-size: 17px;
    font-weight: 700;
    text-transform: capitalize;
    letter-spacing: -0.01em;
  }
  .card-avg {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: var(--muted);
  }
  .card-avg strong { color: var(--text); }

  /* Day rows */
  .day-row {
    display: grid;
    grid-template-columns: 88px 52px 72px 1fr 80px;
    align-items: center;
    gap: 12px;
    padding: 12px 20px;
    border-bottom: 1px solid var(--border);
    transition: background 0.1s;
  }
  .day-row:last-child { border-bottom: none; }
  .day-row:hover { background: var(--card-hover); }
  .day-row.no-data { opacity: 0.4; }

  .day-date {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: var(--muted);
  }
  .day-date .dow {
    display: block;
    font-size: 10px;
    color: var(--dim);
    margin-bottom: 1px;
  }

  .day-score {
    font-family: 'DM Mono', monospace;
    font-size: 24px;
    font-weight: 700;
    line-height: 1;
    letter-spacing: -0.02em;
  }
  .day-score.excellent { color: var(--excellent); }
  .day-score.good      { color: var(--good); }
  .day-score.fair      { color: var(--fair); }
  .day-score.poor      { color: var(--poor); }
  .day-score.none      { color: var(--dim); font-size: 18px; }

  .day-quality {
    font-family: 'DM Mono', monospace;
    font-size: 9px;
    font-weight: 600;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    padding: 3px 7px;
    border-radius: 4px;
    display: inline-block;
    white-space: nowrap;
  }
  .day-quality.EXCELLENT { color: var(--excellent); background: rgba(61,214,140,0.1); }
  .day-quality.GOOD      { color: var(--good);      background: rgba(140,204,48,0.1); }
  .day-quality.FAIR      { color: var(--fair);      background: rgba(232,197,71,0.1); }
  .day-quality.POOR      { color: var(--poor);      background: rgba(224,80,80,0.1); }

  /* Stage bar */
  .stage-bar {
    height: 5px;
    border-radius: 3px;
    display: flex;
    overflow: hidden;
    gap: 1px;
  }
  .stage-bar .seg { border-radius: 1px; }
  .seg.deep  { background: var(--deep); }
  .seg.rem   { background: var(--rem); }
  .seg.light { background: var(--light); }
  .seg.awake { background: var(--awake); }

  .day-total {
    text-align: right;
    font-size: 13px;
    font-weight: 600;
    color: var(--text);
    font-family: 'DM Mono', monospace;
    white-space: nowrap;
  }

  footer {
    margin-top: 48px;
    text-align: center;
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: var(--dim);
    letter-spacing: 0.04em;
  }

  @media (max-width: 520px) {
    .day-row {
      grid-template-columns: 72px 44px 60px 1fr;
    }
    .day-total { display: none; }
    .day-score { font-size: 20px; }
  }
</style>
</head>
<body>
<div class="wrap">
  <nav class="nav">
    <a href="index.html">Sleep</a>
    <a href="activities.html">Activity</a>
    <a href="history.html" class="active">History</a>
  </nav>

  <header>
    <h1>Sleep <span>History</span></h1>
    <div class="updated" id="updatedAt">Loading...</div>
  </header>

  <div id="cards" class="cards"></div>

  <footer>Garmin Connect &middot; last 7 nights per person</footer>
</div>

<script>
const DAYS = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
const MONTHS = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];

function fmtDate(dateStr) {
  const d = new Date(dateStr + 'T00:00:00');
  return {
    dow: DAYS[d.getDay()],
    short: `${d.getDate()} ${MONTHS[d.getMonth()]}`,
  };
}

function scoreClass(q) {
  const map = { EXCELLENT: 'excellent', GOOD: 'good', FAIR: 'fair', POOR: 'poor' };
  return map[q] || 'none';
}

function formatName(name) {
  return name.replace(/_/g, ' ');
}

function renderStageBar(entry) {
  if (!entry || !entry.total) return '<div class="stage-bar"></div>';
  const t = entry.total;
  const deep  = ((entry.deep  || 0) / t * 100).toFixed(1);
  const rem   = ((entry.rem   || 0) / t * 100).toFixed(1);
  const light = ((entry.light || 0) / t * 100).toFixed(1);
  const awake = ((entry.awake || 0) / t * 100).toFixed(1);
  return `<div class="stage-bar">
    <div class="seg deep"  style="width:${deep}%"  title="Deep ${entry.deep_str}"></div>
    <div class="seg rem"   style="width:${rem}%"   title="REM ${entry.rem_str}"></div>
    <div class="seg light" style="width:${light}%" title="Light ${entry.light_str}"></div>
    <div class="seg awake" style="width:${awake}%" title="Awake ${entry.awake_str}"></div>
  </div>`;
}

function renderDayRow(entry) {
  if (!entry || entry.score === null || entry.score === undefined) {
    const d = entry ? fmtDate(entry.date) : { dow: '', short: '' };
    return `<div class="day-row no-data">
      <div class="day-date"><span class="dow">${d.dow}</span>${d.short}</div>
      <div class="day-score none">--</div>
      <div class="day-quality"></div>
      <div class="stage-bar"></div>
      <div class="day-total"></div>
    </div>`;
  }

  const d = fmtDate(entry.date);
  const sc = scoreClass(entry.quality);

  return `<div class="day-row">
    <div class="day-date"><span class="dow">${d.dow}</span>${d.short}</div>
    <div class="day-score ${sc}">${entry.score}</div>
    <div><span class="day-quality ${entry.quality || ''}">${entry.quality || ''}</span></div>
    ${renderStageBar(entry)}
    <div class="day-total">${entry.total_str || ''}</div>
  </div>`;
}

function renderCard(u) {
  const history = (u.history || []).slice().reverse(); // newest first
  const avgLabel = u.weekly_avg != null
    ? `7d avg <strong>${u.weekly_avg}</strong>`
    : 'no data';

  const rows = history.map(renderDayRow).join('');

  return `<div class="card">
    <div class="card-header">
      <div class="card-name">${formatName(u.name)}</div>
      <div class="card-avg">${avgLabel}</div>
    </div>
    ${rows}
  </div>`;
}

async function load() {
  try {
    const res = await fetch('scores.json');
    if (!res.ok) throw new Error(`scores.json not found (${res.status})`);
    const data = await res.json();

    document.getElementById('updatedAt').textContent =
      data.updated_at ? `Updated ${data.updated_at.replace('T', ' ')}` : '';

    const users = data.users || [];
    if (!users.length) {
      document.getElementById('cards').innerHTML =
        `<div style="color:var(--muted);font-size:13px;padding:24px 0">No data yet.</div>`;
      return;
    }

    document.getElementById('cards').innerHTML = users.map(renderCard).join('');
  } catch (e) {
    document.getElementById('cards').innerHTML =
      `<div style="color:var(--muted);font-size:13px;padding:24px 0">Could not load scores.json: ${e.message}</div>`;
  }
}

load();
</script>
</body>
</html>
