<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Sleep Leaderboard</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Mono:ital,wght@0,300;0,400;0,500;1,400&family=DM+Sans:wght@400;500;600;700&display=swap');

  :root {
    --bg: #080c10;
    --surface: #0e1318;
    --card: #131920;
    --card-hover: #171f28;
    --border: #1e2832;
    --border-bright: #2a3844;
    --text: #dce8f0;
    --muted: #5a7080;
    --dim: #3a5060;
    --accent: #4fa8d0;
    --accent-glow: rgba(79,168,208,0.12);
    --gold: #e8c547;
    --gold-glow: rgba(232,197,71,0.15);
    --silver: #a0b8c8;
    --bronze: #c07840;
    --excellent: #3dd68c;
    --good: #8ccc30;
    --fair: #e8c547;
    --poor: #e05050;
    --deep: #5b6af0;
    --rem: #a060e0;
    --light: #30a8d8;
    --awake: #e05050;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding: 40px 16px 80px;
    line-height: 1.5;
    background-image:
      radial-gradient(ellipse 80% 40% at 50% -10%, rgba(79,168,208,0.06) 0%, transparent 60%);
  }

  .wrap { max-width: 860px; margin: 0 auto; }

  /* Header */
  header { margin-bottom: 36px; }
  .header-top {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    flex-wrap: wrap;
    gap: 12px;
    margin-bottom: 6px;
  }
  h1 {
    font-size: 26px;
    font-weight: 700;
    letter-spacing: -0.03em;
    color: var(--text);
  }
  h1 span { color: var(--accent); }
  .updated {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: var(--muted);
    margin-top: 6px;
  }

  /* Champion banner */
  .champion {
    background: linear-gradient(135deg, rgba(232,197,71,0.08) 0%, rgba(232,197,71,0.03) 100%);
    border: 1px solid rgba(232,197,71,0.2);
    border-radius: 12px;
    padding: 16px 20px;
    margin-bottom: 16px;
    display: flex;
    align-items: center;
    gap: 16px;
  }
  .champion-icon { font-size: 28px; line-height: 1; flex-shrink: 0; }
  .champion-label {
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--gold);
    margin-bottom: 3px;
    font-family: 'DM Mono', monospace;
  }
  .champion-name {
    font-size: 20px;
    font-weight: 700;
    text-transform: capitalize;
    color: var(--text);
    letter-spacing: -0.02em;
  }
  .champion-avg {
    margin-left: auto;
    text-align: right;
    flex-shrink: 0;
  }
  .champion-avg-num {
    font-size: 32px;
    font-weight: 700;
    color: var(--gold);
    line-height: 1;
    font-family: 'DM Mono', monospace;
  }
  .champion-avg-label {
    font-size: 10px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.08em;
    margin-top: 2px;
  }

  /* Section label */
  .section-label {
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--dim);
    margin-bottom: 10px;
    font-family: 'DM Mono', monospace;
  }

  /* Leaderboard rows */
  .leaderboard { display: flex; flex-direction: column; gap: 8px; }

  .row {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 16px 18px;
    display: grid;
    grid-template-columns: 44px 1fr 104px 80px;
    gap: 14px;
    align-items: center;
    cursor: pointer;
    transition: background 0.12s, border-color 0.12s;
    position: relative;
  }
  .row:hover { background: var(--card-hover); border-color: var(--border-bright); }
  .row.expanded { background: var(--card-hover); border-color: var(--border-bright); }
  .row.rank-1 { border-color: rgba(232,197,71,0.15); }
  .row.rank-1:hover, .row.rank-1.expanded { border-color: rgba(232,197,71,0.3); }

  .rank {
    width: 36px;
    height: 36px;
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'DM Mono', monospace;
    font-size: 13px;
    font-weight: 500;
    background: var(--surface);
    color: var(--muted);
    border: 1px solid var(--border);
    flex-shrink: 0;
  }
  .rank.r1 { color: var(--gold); border-color: rgba(232,197,71,0.25); background: rgba(232,197,71,0.06); }
  .rank.r2 { color: var(--silver); border-color: rgba(160,184,200,0.2); }
  .rank.r3 { color: var(--bronze); border-color: rgba(192,120,64,0.2); }

  .name-cell { min-width: 0; }
  .name {
    font-size: 16px;
    font-weight: 600;
    text-transform: capitalize;
    letter-spacing: -0.01em;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .date-line { font-size: 11px; color: var(--muted); margin-top: 2px; font-family: 'DM Mono', monospace; }

  /* Sparkline */
  .sparkline-cell {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 3px;
  }
  .sparkline-label {
    font-size: 9px;
    color: var(--dim);
    text-transform: uppercase;
    letter-spacing: 0.08em;
    font-family: 'DM Mono', monospace;
  }

  /* Score */
  .score-cell { text-align: right; }
  .score {
    font-size: 32px;
    font-weight: 700;
    line-height: 1;
    font-family: 'DM Mono', monospace;
    letter-spacing: -0.02em;
  }
  .score.s-excellent { color: var(--excellent); }
  .score.s-good { color: var(--good); }
  .score.s-fair { color: var(--fair); }
  .score.s-poor { color: var(--poor); }
  .score.s-none { color: var(--dim); }
  .quality {
    font-size: 9px;
    font-weight: 600;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    margin-top: 4px;
    font-family: 'DM Mono', monospace;
  }
  .quality.EXCELLENT { color: var(--excellent); }
  .quality.GOOD { color: var(--good); }
  .quality.FAIR { color: var(--fair); }
  .quality.POOR { color: var(--poor); }
  .weekly-avg { font-size: 10px; color: var(--muted); margin-top: 5px; }
  .weekly-avg strong { color: var(--text); }

  /* Expanded breakdown */
  .stages-bar {
    display: none;
    grid-column: 1 / -1;
    height: 6px;
    border-radius: 3px;
    overflow: hidden;
    margin-top: 10px;
    gap: 1px;
  }
  .expanded .stages-bar { display: flex; }
  .stage.deep { background: var(--deep); }
  .stage.rem { background: var(--rem); }
  .stage.light { background: var(--light); }
  .stage.awake { background: var(--awake); }

  .breakdown {
    display: none;
    grid-column: 1 / -1;
    grid-template-columns: repeat(auto-fit, minmax(110px, 1fr));
    gap: 12px;
    padding-top: 16px;
    margin-top: 4px;
    border-top: 1px solid var(--border);
  }
  .expanded .breakdown { display: grid; }

  .stat { display: flex; flex-direction: column; gap: 3px; }
  .stat-label {
    font-size: 9px;
    color: var(--dim);
    text-transform: uppercase;
    letter-spacing: 0.1em;
    font-family: 'DM Mono', monospace;
  }
  .stat-value { font-size: 15px; font-weight: 600; }
  .stat-sub { font-size: 11px; color: var(--muted); }

  /* Stage legend */
  .stage-legend {
    display: none;
    grid-column: 1 / -1;
    flex-wrap: wrap;
    gap: 14px;
    margin-top: 2px;
  }
  .expanded .stage-legend { display: flex; }
  .legend-item { display: flex; align-items: center; gap: 5px; font-size: 10px; color: var(--muted); }
  .legend-dot { width: 8px; height: 8px; border-radius: 2px; }

  /* Empty / no data */
  .no-data { color: var(--dim); font-size: 13px; }

  footer {
    margin-top: 48px;
    text-align: center;
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: var(--dim);
    letter-spacing: 0.04em;
  }

  @media (max-width: 580px) {
    .row { grid-template-columns: 36px 1fr 72px; }
    .sparkline-cell { display: none; }
    .score { font-size: 26px; }
    .champion-avg-num { font-size: 26px; }
  }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="header-top">
      <h1>Sleep <span>Leaderboard</span></h1>
    </div>
    <div class="updated" id="updatedAt">Loading...</div>
  </header>

  <div id="championWrap"></div>

  <div class="section-label">Last night</div>
  <div id="board" class="leaderboard"></div>

  <footer>Garmin Connect &middot; data updated manually</footer>
</div>

<script>
function scoreClass(q) {
  const map = { EXCELLENT: 's-excellent', GOOD: 's-good', FAIR: 's-fair', POOR: 's-poor' };
  return map[q] || '';
}

function sparklineSVG(history) {
  const w = 96, h = 30, pad = 3;
  const points = history.map((d, i) => ({
    x: pad + (i * (w - 2 * pad)) / Math.max(history.length - 1, 1),
    score: d.score,
  }));
  const valid = points.filter(p => p.score !== null);
  if (valid.length === 0) {
    return `<svg class="sparkline" width="${w}" height="${h}"><text x="${w/2}" y="${h/2+4}" text-anchor="middle" fill="#3a5060" font-size="9" font-family="monospace">no data</text></svg>`;
  }
  const yFor = s => h - pad - (s / 100) * (h - 2 * pad);
  let path = '', started = false;
  for (const p of points) {
    if (p.score === null) { started = false; continue; }
    path += `${started ? 'L' : 'M'}${p.x.toFixed(1)},${yFor(p.score).toFixed(1)} `;
    started = true;
  }
  const last = [...points].reverse().find(p => p.score !== null);
  const dots = valid.map(p =>
    `<circle cx="${p.x.toFixed(1)}" cy="${yFor(p.score).toFixed(1)}" r="1.5" fill="#4fa8d0" opacity="0.5"/>`
  ).join('');
  const lastDot = last
    ? `<circle cx="${last.x.toFixed(1)}" cy="${yFor(last.score).toFixed(1)}" r="2.5" fill="#4fa8d0"/>`
    : '';
  return `<svg class="sparkline" width="${w}" height="${h}" viewBox="0 0 ${w} ${h}">
    <path d="${path}" fill="none" stroke="#4fa8d0" stroke-width="1.5" stroke-linejoin="round" stroke-linecap="round" opacity="0.6"/>
    ${dots}${lastDot}
  </svg>`;
}

function rankLabel(i) {
  return ['1st','2nd','3rd'][i] || `${i+1}th`;
}
function rankClass(i) {
  return ['r1','r2','r3'][i] || '';
}

function renderChampion(users) {
  const withAvg = users.filter(u => u.weekly_avg !== null && u.weekly_avg !== undefined);
  if (withAvg.length === 0) return '';
  const champ = withAvg.reduce((a, b) => b.weekly_avg > a.weekly_avg ? b : a);
  return `
    <div class="champion">
      <div class="champion-icon">🏆</div>
      <div>
        <div class="champion-label">7-day champion</div>
        <div class="champion-name">${champ.name}</div>
      </div>
      <div class="champion-avg">
        <div class="champion-avg-num">${champ.weekly_avg}</div>
        <div class="champion-avg-label">avg score</div>
      </div>
    </div>`;
}

function renderRow(u, i) {
  const latest = u.latest;

  if (!latest) {
    return `
      <div class="row">
        <div class="rank ${rankClass(i)}">${rankLabel(i)}</div>
        <div class="name-cell">
          <div class="name">${u.name}</div>
          <div class="date-line no-data">No data in last 7 days</div>
        </div>
        <div class="sparkline-cell">${sparklineSVG(u.history || [])}<span class="sparkline-label">7d</span></div>
        <div class="score-cell"><div class="score s-none">--</div></div>
      </div>`;
  }

  const total = latest.total || 1;
  const w = {
    deep: (latest.deep / total) * 100,
    rem: (latest.rem / total) * 100,
    light: (latest.light / total) * 100,
    awake: (latest.awake / total) * 100,
  };

  const weekly = u.weekly_avg != null
    ? `<div class="weekly-avg">7d avg <strong>${u.weekly_avg}</strong></div>`
    : '';

  return `
    <div class="row rank-${i+1}" data-name="${u.name}">
      <div class="rank ${rankClass(i)}">${rankLabel(i)}</div>
      <div class="name-cell">
        <div class="name">${u.name}</div>
        <div class="date-line">${latest.date} &middot; ${latest.total_str}</div>
      </div>
      <div class="sparkline-cell">
        ${sparklineSVG(u.history || [])}
        <span class="sparkline-label">7d</span>
      </div>
      <div class="score-cell">
        <div class="score ${scoreClass(latest.quality)}">${latest.score}</div>
        <div class="quality ${latest.quality || ''}">${latest.quality || ''}</div>
        ${weekly}
      </div>
      <div class="stages-bar">
        <div class="stage deep" style="width:${w.deep}%" title="Deep ${latest.deep_str}"></div>
        <div class="stage rem" style="width:${w.rem}%" title="REM ${latest.rem_str}"></div>
        <div class="stage light" style="width:${w.light}%" title="Light ${latest.light_str}"></div>
        <div class="stage awake" style="width:${w.awake}%" title="Awake ${latest.awake_str}"></div>
      </div>
      <div class="stage-legend">
        <span class="legend-item"><span class="legend-dot" style="background:var(--deep)"></span>Deep ${latest.deep_str} (${latest.deep_pct}%)</span>
        <span class="legend-item"><span class="legend-dot" style="background:var(--rem)"></span>REM ${latest.rem_str} (${latest.rem_pct}%)</span>
        <span class="legend-item"><span class="legend-dot" style="background:var(--light)"></span>Light ${latest.light_str} (${latest.light_pct}%)</span>
        <span class="legend-item"><span class="legend-dot" style="background:var(--awake)"></span>Awake ${latest.awake_str} (${latest.awake_pct}%)</span>
      </div>
      <div class="breakdown">
        <div class="stat"><span class="stat-label">Avg HR</span><span class="stat-value">${latest.avg_hr ?? '--'}</span><span class="stat-sub">resting ${latest.resting_hr ?? '--'}</span></div>
        <div class="stat"><span class="stat-label">HRV</span><span class="stat-value">${latest.avg_hrv ?? '--'}</span><span class="stat-sub">${latest.hrv_status ?? ''}</span></div>
        <div class="stat"><span class="stat-label">Stress</span><span class="stat-value">${latest.avg_stress ?? '--'}</span><span class="stat-sub">overnight avg</span></div>
        <div class="stat"><span class="stat-label">SpO2</span><span class="stat-value">${latest.avg_spo2 ?? '--'}%</span><span class="stat-sub">overnight avg</span></div>
        <div class="stat"><span class="stat-label">Respiration</span><span class="stat-value">${latest.avg_respiration ?? '--'}</span><span class="stat-sub">breaths/min</span></div>
        <div class="stat"><span class="stat-label">Body Battery</span><span class="stat-value">+${latest.body_battery_change ?? '--'}</span><span class="stat-sub">overnight gain</span></div>
      </div>
    </div>`;
}

async function load() {
  try {
    const res = await fetch('scores.json');
    if (!res.ok) throw new Error(`scores.json not found (${res.status})`);
    const data = await res.json();

    document.getElementById('updatedAt').textContent =
      data.updated_at ? `Updated ${data.updated_at.replace('T', ' ')}` : '';

    document.getElementById('championWrap').innerHTML = renderChampion(data.users || []);
    document.getElementById('board').innerHTML = (data.users || []).map(renderRow).join('');

    document.querySelectorAll('.row[data-name]').forEach(row => {
      row.addEventListener('click', () => row.classList.toggle('expanded'));
    });
  } catch (e) {
    document.getElementById('board').innerHTML =
      `<div style="color:#5a7080;font-size:13px;padding:24px 0">Could not load scores.json: ${e.message}</div>`;
  }
}

load();
</script>
</body>
</html>
