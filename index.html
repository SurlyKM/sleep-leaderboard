<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Sleep Leaderboard</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Mono:ital,wght@0,300;0,400;0,500;1,400&family=DM+Sans:wght@400;500;600;700&display=swap');

  :root {
    --bg: #080c10;
    --surface: #0e1318;
    --card: #131920;
    --card-hover: #171f28;
    --border: #1e2832;
    --border-bright: #2a3844;
    --text: #dce8f0;
    --muted: #5a7080;
    --dim: #3a5060;
    --accent: #4fa8d0;
    --accent-glow: rgba(79,168,208,0.12);
    --gold: #e8c547;
    --gold-glow: rgba(232,197,71,0.15);
    --silver: #a0b8c8;
    --bronze: #c07840;
    --excellent: #3dd68c;
    --good: #8ccc30;
    --fair: #e8c547;
    --poor: #e05050;
    --deep: #5b6af0;
    --rem: #a060e0;
    --light: #30a8d8;
    --awake: #e05050;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding: 40px 16px 80px;
    line-height: 1.5;
    background-image:
      radial-gradient(ellipse 80% 40% at 50% -10%, rgba(79,168,208,0.06) 0%, transparent 60%);
  }

  .wrap { max-width: 860px; margin: 0 auto; }

  /* Nav */
  .nav {
    display: flex;
    gap: 6px;
    margin-bottom: 32px;
  }
  .nav a {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    text-decoration: none;
    padding: 6px 14px;
    border-radius: 6px;
    border: 1px solid var(--border);
    color: var(--muted);
    transition: all 0.12s;
  }
  .nav a:hover { border-color: var(--border-bright); color: var(--text); }
  .nav a.active { background: var(--card); border-color: var(--accent); color: var(--accent); }

  /* Header */
  header { margin-bottom: 36px; }
  .header-top {
    display: flex;
    justify-content: space-between;
    align-items: center;
    flex-wrap: wrap;
    gap: 12px;
    margin-bottom: 6px;
  }
  .sheep {
    display: block;
    flex-shrink: 0;
    animation: sheepFloat 3.5s ease-in-out infinite alternate;
  }
  .sheep .z1, .sheep .z2, .sheep .z3 {
    transform-box: fill-box;
    transform-origin: center bottom;
  }
  .sheep .z1 { animation: zFloat 2.4s ease-in infinite 0.0s; }
  .sheep .z2 { animation: zFloat 2.4s ease-in infinite 0.7s; }
  .sheep .z3 { animation: zFloat 2.4s ease-in infinite 1.4s; }

  @keyframes sheepFloat {
    from { transform: translateY(0px); }
    to   { transform: translateY(-5px); }
  }
  .spoon-svg .sz {
    transform-box: fill-box;
    transform-origin: center bottom;
    opacity: 0;
    animation: zFloat 2.4s ease-in infinite;
  }
  .spoon-svg .sz2 { animation-delay: 0.7s; }
  .spoon-svg .sz3 { animation-delay: 1.4s; }
  .spoon-rock {
    transform-box: fill-box;
    transform-origin: center;
    animation: spoonRock 3.4s ease-in-out infinite alternate;
  }
  @keyframes spoonRock {
    from { transform: rotate(-3deg); }
    to   { transform: rotate(3deg); }
  }
  @keyframes zFloat {
    0%   { transform: translateY(0px);  opacity: 1;   }
    75%  { transform: translateY(-7px); opacity: 0;   }
    100% { transform: translateY(-7px); opacity: 0;   }
  }
  h1 {
    font-size: 26px;
    font-weight: 700;
    letter-spacing: -0.03em;
    color: var(--text);
  }
  h1 span { color: var(--accent); }
  .updated {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: var(--muted);
    margin-top: 6px;
  }

  /* Group switcher */
  .group-switch { display: none; flex-wrap: wrap; gap: 6px; margin: -16px 0 24px; }
  .group-switch.visible { display: flex; }
  .group-pill {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    cursor: pointer;
    padding: 5px 12px;
    border-radius: 14px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--muted);
    transition: all 0.12s;
  }
  .group-pill:hover { border-color: var(--border-bright); color: var(--text); }
  .group-pill.active { background: var(--accent); border-color: var(--accent); color: #08111a; }

  /* Champion banner */
  .champion {
    background: linear-gradient(135deg, rgba(232,197,71,0.08) 0%, rgba(232,197,71,0.03) 100%);
    border: 1px solid rgba(232,197,71,0.2);
    border-radius: 12px;
    padding: 16px 20px;
    margin-bottom: 16px;
    display: flex;
    align-items: center;
    gap: 16px;
  }
  .champion-icon { font-size: 28px; line-height: 1; flex-shrink: 0; }
  .champion-label {
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--gold);
    margin-bottom: 3px;
    font-family: 'DM Mono', monospace;
  }
  .champion-name {
    font-size: 20px;
    font-weight: 700;
    text-transform: capitalize;
    color: var(--text);
    letter-spacing: -0.02em;
  }
  .champion-avg {
    margin-left: auto;
    text-align: right;
    flex-shrink: 0;
  }
  .champion-avg-num {
    font-size: 32px;
    font-weight: 700;
    color: var(--gold);
    line-height: 1;
    font-family: 'DM Mono', monospace;
  }
  .wooden-spoon {
    background: linear-gradient(135deg, rgba(139,90,60,0.08) 0%, rgba(139,90,60,0.03) 100%);
    border: 1px solid rgba(139,90,60,0.2);
    border-radius: 12px;
    padding: 14px 20px;
    margin-bottom: 24px;
    display: flex;
    align-items: center;
    gap: 16px;
  }
  .wooden-spoon-icon { font-size: 26px; line-height: 1; flex-shrink: 0; }
  .wooden-spoon-label {
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: #8b5a3c;
    margin-bottom: 3px;
    font-family: "DM Mono", monospace;
  }
  .wooden-spoon-name {
    font-size: 16px;
    font-weight: 700;
    text-transform: capitalize;
    color: var(--text);
    letter-spacing: -0.01em;
  }
  .wooden-spoon-right {
    margin-left: auto;
    text-align: right;
    flex-shrink: 0;
  }
  .wooden-spoon-score {
    font-size: 28px;
    font-weight: 700;
    color: #a0684a;
    line-height: 1;
    font-family: "DM Mono", monospace;
  }
  .wooden-spoon-date {
    font-size: 10px;
    color: var(--muted);
    margin-top: 3px;
    font-family: "DM Mono", monospace;
  }

  .champion-avg-label {
    font-size: 10px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.08em;
    margin-top: 2px;
  }

  /* Streak card */
  .streak-card {
    background: linear-gradient(135deg, rgba(79,168,208,0.07) 0%, rgba(79,168,208,0.02) 100%);
    border: 1px solid rgba(79,168,208,0.22);
    border-radius: 12px;
    padding: 16px 20px;
    margin-bottom: 16px;
    display: flex;
    align-items: center;
    gap: 16px;
  }
  .streak-icon { font-size: 26px; line-height: 1; flex-shrink: 0; }
  .streak-label {
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--accent);
    margin-bottom: 3px;
    font-family: 'DM Mono', monospace;
  }
  .streak-name {
    font-size: 20px;
    font-weight: 700;
    text-transform: capitalize;
    color: var(--text);
    letter-spacing: -0.02em;
  }
  .streak-right { margin-left: auto; text-align: right; flex-shrink: 0; }
  .streak-days {
    font-size: 32px;
    font-weight: 700;
    color: var(--accent);
    line-height: 1;
    font-family: 'DM Mono', monospace;
  }
  .streak-sub {
    font-size: 10px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.08em;
    margin-top: 2px;
  }

  /* Nights won */
  .nights-won {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 18px 20px;
    margin-bottom: 16px;
  }
  .nights-won-title {
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 14px;
    font-family: 'DM Mono', monospace;
  }
  .nw-row { display: flex; align-items: center; gap: 12px; margin-bottom: 12px; }
  .nw-row:last-of-type { margin-bottom: 0; }
  .nw-name {
    width: 92px;
    flex-shrink: 0;
    font-size: 13px;
    font-weight: 600;
    text-transform: capitalize;
    text-align: right;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .nw-track { flex: 1; height: 22px; background: var(--surface); border-radius: 6px; overflow: hidden; }
  .nw-fill { height: 100%; border-radius: 6px; transition: width 0.4s ease; }
  .nw-count {
    width: 70px;
    flex-shrink: 0;
    font-family: 'DM Mono', monospace;
    font-size: 14px;
    font-weight: 600;
  }
  .nw-count span { font-size: 10px; color: var(--muted); font-weight: 400; }
  .nw-foot {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    color: var(--dim);
    margin-top: 14px;
  }

  /* Section label */
  .section-label {
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--dim);
    margin-bottom: 10px;
    font-family: 'DM Mono', monospace;
  }

  /* Leaderboard rows */
  .leaderboard { display: flex; flex-direction: column; gap: 8px; }

  .row {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 16px 18px;
    display: grid;
    grid-template-columns: 44px 1fr 104px 80px;
    gap: 14px;
    align-items: center;
    cursor: pointer;
    transition: background 0.12s, border-color 0.12s;
    position: relative;
  }
  .row:hover { background: var(--card-hover); border-color: var(--border-bright); }
  .row.expanded { background: var(--card-hover); border-color: var(--border-bright); }
  .row.rank-1 { border-color: rgba(232,197,71,0.15); }
  .row.rank-1:hover, .row.rank-1.expanded { border-color: rgba(232,197,71,0.3); }

  .rank {
    width: 36px;
    height: 36px;
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'DM Mono', monospace;
    font-size: 13px;
    font-weight: 500;
    background: var(--surface);
    color: var(--muted);
    border: 1px solid var(--border);
    flex-shrink: 0;
  }
  .rank.r1 { color: var(--gold); border-color: rgba(232,197,71,0.25); background: rgba(232,197,71,0.06); }
  .rank.r2 { color: var(--silver); border-color: rgba(160,184,200,0.2); }
  .rank.r3 { color: var(--bronze); border-color: rgba(192,120,64,0.2); }

  .name-cell { min-width: 0; }
  .name {
    font-size: 16px;
    font-weight: 600;
    text-transform: capitalize;
    letter-spacing: -0.01em;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .date-line { font-size: 11px; color: var(--muted); margin-top: 2px; font-family: 'DM Mono', monospace; }

  /* Sparkline */
  .sparkline-cell {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 3px;
  }
  .sparkline-label {
    font-size: 9px;
    color: var(--dim);
    text-transform: uppercase;
    letter-spacing: 0.08em;
    font-family: 'DM Mono', monospace;
  }

  /* Score */
  .score-cell { text-align: right; }
  .score {
    font-size: 32px;
    font-weight: 700;
    line-height: 1;
    font-family: 'DM Mono', monospace;
    letter-spacing: -0.02em;
  }
  .score.s-excellent { color: var(--excellent); }
  .score.s-good { color: var(--good); }
  .score.s-fair { color: var(--fair); }
  .score.s-poor { color: var(--poor); }
  .score.s-none { color: var(--dim); }
  .quality {
    font-size: 9px;
    font-weight: 600;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    margin-top: 4px;
    font-family: 'DM Mono', monospace;
  }
  .quality.EXCELLENT { color: var(--excellent); }
  .quality.GOOD { color: var(--good); }
  .quality.FAIR { color: var(--fair); }
  .quality.POOR { color: var(--poor); }
  .delta {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    font-weight: 600;
    margin-top: 4px;
  }
  .delta.up   { color: var(--excellent); }
  .delta.down { color: var(--poor); }
  .delta.flat { color: var(--dim); }
  .weekly-avg { font-size: 10px; color: var(--muted); margin-top: 5px; }
  .weekly-avg strong { color: var(--text); }

  /* Expanded breakdown */
  .stages-bar {
    display: none;
    grid-column: 1 / -1;
    height: 6px;
    border-radius: 3px;
    overflow: hidden;
    margin-top: 10px;
    gap: 1px;
  }
  .expanded .stages-bar { display: flex; }
  .stage.deep { background: var(--deep); }
  .stage.rem { background: var(--rem); }
  .stage.light { background: var(--light); }
  .stage.awake { background: var(--awake); }

  .breakdown {
    display: none;
    grid-column: 1 / -1;
    grid-template-columns: repeat(auto-fit, minmax(110px, 1fr));
    gap: 12px;
    padding-top: 16px;
    margin-top: 4px;
    border-top: 1px solid var(--border);
  }
  .expanded .breakdown { display: grid; }

  .stat { display: flex; flex-direction: column; gap: 3px; }
  .stat-label {
    font-size: 9px;
    color: var(--dim);
    text-transform: uppercase;
    letter-spacing: 0.1em;
    font-family: 'DM Mono', monospace;
  }
  .stat-value { font-size: 15px; font-weight: 600; }
  .stat-sub { font-size: 11px; color: var(--muted); }

  /* Stage legend */
  .stage-legend {
    display: none;
    grid-column: 1 / -1;
    flex-wrap: wrap;
    gap: 14px;
    margin-top: 2px;
  }
  .expanded .stage-legend { display: flex; }
  .legend-item { display: flex; align-items: center; gap: 5px; font-size: 10px; color: var(--muted); }
  .legend-dot { width: 8px; height: 8px; border-radius: 2px; }

  /* Sync pending indicator */
  .sync-badge {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    font-family: 'DM Mono', monospace;
    font-size: 9px;
    font-weight: 600;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--fair);
    background: rgba(232,197,71,0.08);
    border: 1px solid rgba(232,197,71,0.2);
    border-radius: 4px;
    padding: 2px 6px;
    margin-top: 3px;
  }
  .score.s-stale { color: var(--dim); }

  /* Empty / no data */
  .no-data { color: var(--dim); font-size: 13px; }

  footer {
    margin-top: 48px;
    text-align: center;
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: var(--dim);
    letter-spacing: 0.04em;
  }

  @media (max-width: 580px) {
    .row { grid-template-columns: 36px 1fr 72px; }
    .sparkline-cell { display: none; }
    .score { font-size: 26px; }
    .champion-avg-num { font-size: 26px; }
  }
</style>
</head>
<body>
<div class="wrap">
  <nav class="nav">
    <a href="index.html" class="active">Sleep</a>
    <a href="activities.html">Activity</a>
    <a href="history.html">History</a>
  </nav>
  <header>
    <div class="header-top">
      <h1>Sleep <span>Leaderboard</span></h1>
      <svg class="sheep" width="52" height="44" viewBox="0 0 52 44" fill="none" xmlns="http://www.w3.org/2000/svg" aria-label="sheep">
        <!-- wool body -->
        <circle cx="22" cy="22" r="11" fill="#d0dde8" opacity="0.92"/>
        <circle cx="30" cy="20" r="9" fill="#d0dde8" opacity="0.92"/>
        <circle cx="26" cy="15" r="8" fill="#d0dde8" opacity="0.92"/>
        <circle cx="18" cy="17" r="7" fill="#d0dde8" opacity="0.88"/>
        <circle cx="32" cy="26" r="7" fill="#d0dde8" opacity="0.88"/>
        <circle cx="20" cy="27" r="6" fill="#d0dde8" opacity="0.88"/>
        <!-- head -->
        <ellipse cx="38" cy="18" rx="7" ry="6" fill="#4a5568"/>
        <!-- ear -->
        <ellipse cx="34" cy="13" rx="3" ry="2" fill="#4a5568" transform="rotate(-20 34 13)"/>
        <!-- eye -->
        <circle cx="40" cy="17" r="1.2" fill="#dce8f0"/>
        <circle cx="40.4" cy="16.7" r="0.5" fill="#0e1318"/>
        <!-- nostril -->
        <circle cx="43" cy="20" r="0.8" fill="#2d3748"/>
        <!-- legs -->
        <rect x="18" y="30" width="3" height="9" rx="1.5" fill="#4a5568"/>
        <rect x="23" y="31" width="3" height="8" rx="1.5" fill="#4a5568"/>
        <rect x="28" y="31" width="3" height="8" rx="1.5" fill="#4a5568"/>
        <rect x="33" y="30" width="3" height="9" rx="1.5" fill="#4a5568"/>
        <!-- zzz -->
        <text class="z1" x="44" y="10" font-family="DM Sans, sans-serif" font-size="6" font-weight="700" fill="#4fa8d0" opacity="0.8">z</text>
        <text class="z2" x="46" y="5" font-family="DM Sans, sans-serif" font-size="7.5" font-weight="700" fill="#4fa8d0" opacity="0.8">z</text>
        <text class="z3" x="49" y="1" font-family="DM Sans, sans-serif" font-size="9" font-weight="700" fill="#4fa8d0" opacity="0.8">z</text>
      </svg>
    </div>
    <div class="updated" id="updatedAt">Loading...</div>
  </header>

  <div id="groupSwitch" class="group-switch"></div>

  <div class="section-label">Last night</div>
  <div id="board" class="leaderboard"></div>

  <div class="section-label" id="weekLabel" style="margin-top:32px;display:none">This week</div>
  <div id="weekWrap"></div>

  <div class="section-label" id="monthLabel" style="margin-top:32px;display:none">This month</div>
  <div id="monthWrap"></div>

  <footer>Garmin Connect &middot; data updated manually</footer>
</div>

<script>
function scoreClass(q) {
  const map = { EXCELLENT: 's-excellent', GOOD: 's-good', FAIR: 's-fair', POOR: 's-poor' };
  return map[q] || '';
}

function dn(name) {
  const m = (DATA && DATA.display_names) || {};
  return m[name] || name.replace(/_/g, ' ');
}

function sleepNightLabel(dateStr) {
  // Garmin stamps sleep with the wake date; subtract 1 day to show
  // the night you went to sleep ("Mon 8 Jun" instead of "Tue 9 Jun").
  const months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  const days   = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
  const d = new Date(dateStr + 'T00:00:00');
  d.setDate(d.getDate() - 1);
  return `${days[d.getDay()]} ${d.getDate()} ${months[d.getMonth()]}`;
}

function sparklineSVG(history) {
  const w = 96, h = 30, pad = 3;
  const points = history.map((d, i) => ({
    x: pad + (i * (w - 2 * pad)) / Math.max(history.length - 1, 1),
    score: d.score,
  }));
  const valid = points.filter(p => p.score !== null);
  if (valid.length === 0) {
    return `<svg class="sparkline" width="${w}" height="${h}"><text x="${w/2}" y="${h/2+4}" text-anchor="middle" fill="#3a5060" font-size="9" font-family="monospace">no data</text></svg>`;
  }
  const yFor = s => h - pad - (s / 100) * (h - 2 * pad);
  let path = '', started = false;
  for (const p of points) {
    if (p.score === null) { started = false; continue; }
    path += `${started ? 'L' : 'M'}${p.x.toFixed(1)},${yFor(p.score).toFixed(1)} `;
    started = true;
  }
  const last = [...points].reverse().find(p => p.score !== null);
  const dots = valid.map(p =>
    `<circle cx="${p.x.toFixed(1)}" cy="${yFor(p.score).toFixed(1)}" r="1.5" fill="#4fa8d0" opacity="0.5"/>`
  ).join('');
  const lastDot = last
    ? `<circle cx="${last.x.toFixed(1)}" cy="${yFor(last.score).toFixed(1)}" r="2.5" fill="#4fa8d0"/>`
    : '';
  return `<svg class="sparkline" width="${w}" height="${h}" viewBox="0 0 ${w} ${h}">
    <path d="${path}" fill="none" stroke="#4fa8d0" stroke-width="1.5" stroke-linejoin="round" stroke-linecap="round" opacity="0.6"/>
    ${dots}${lastDot}
  </svg>`;
}

function rankLabel(i) {
  return ['1st','2nd','3rd'][i] || `${i+1}th`;
}
function rankClass(i) {
  return ['r1','r2','r3'][i] || '';
}

function renderWoodenSpoon(ws) {
  if (!ws) return '';
  return `
    <div class="wooden-spoon">
      <div class="wooden-spoon-icon"><svg class="spoon-svg" width="44" height="44" viewBox="0 0 44 44" aria-label="sleeping wooden spoon">
        <g class="spoon-rock">
          <ellipse cx="14" cy="13" rx="8" ry="9.5" fill="#a06a38" transform="rotate(-38 14 13)"/>
          <ellipse cx="13" cy="12" rx="4.5" ry="6" fill="#7d4f26" transform="rotate(-38 13 12)"/>
          <rect x="17" y="17" width="5" height="22" rx="2.5" fill="#a06a38" transform="rotate(-38 19 18)"/>
          <path d="M 9 8 Q 11 10 10 14" stroke="#c08850" stroke-width="1.1" fill="none" opacity="0.6"/>
          <path d="M 9.5 14.5 q 1.6 1.1 3.2 0" stroke="#4a3015" stroke-width="1.1" fill="none" stroke-linecap="round" transform="rotate(-38 11 14.5)"/>
          <line x1="8" y1="11" x2="10.5" y2="11" stroke="#4a3015" stroke-width="1.1" stroke-linecap="round" transform="rotate(-30 9 11)"/>
          <line x1="13.5" y1="9" x2="16" y2="9" stroke="#4a3015" stroke-width="1.1" stroke-linecap="round" transform="rotate(-30 15 9)"/>
        </g>
        <text class="sz" x="28" y="14" font-family="DM Sans, sans-serif" font-size="7" font-weight="700" fill="#c07840">z</text>
        <text class="sz sz2" x="32" y="9" font-family="DM Sans, sans-serif" font-size="8.5" font-weight="700" fill="#c07840">z</text>
        <text class="sz sz3" x="36" y="5" font-family="DM Sans, sans-serif" font-size="10" font-weight="700" fill="#c07840">z</text>
      </svg></div>
      <div>
        <div class="wooden-spoon-label">Wooden spoon &middot; 30-day low</div>
        <div class="wooden-spoon-name">${dn(ws.name)}</div>
      </div>
      <div class="wooden-spoon-right">
        <div class="wooden-spoon-score">${ws.score}</div>
        <div class="wooden-spoon-date">${ws.date}</div>
      </div>
    </div>`;
}

function renderStreak(st) {
  if (!st) return '';
  return `
    <div class="streak-card">
      <div class="streak-icon">🔥</div>
      <div>
        <div class="streak-label">Longest streak &middot; 30 days</div>
        <div class="streak-name">${dn(st.name)}</div>
      </div>
      <div class="streak-right">
        <div class="streak-days">${st.days}</div>
        <div class="streak-sub">nights at 1st</div>
      </div>
    </div>`;
}

function renderNightsWon(nw) {
  if (!nw || !nw.counts || !nw.counts.length) return '';
  const palette = ['#3dd68c', '#4fa8d0', '#a78bfa', '#e8c547', '#f0997b', '#ed93b1'];
  const max = Math.max(...nw.counts.map(c => c.nights), 1);
  const rows = nw.counts.map((c, i) => {
    const pct = Math.round((c.nights / max) * 100);
    const color = palette[i % palette.length];
    return `
      <div class="nw-row">
        <div class="nw-name">${dn(c.name)}</div>
        <div class="nw-track"><div class="nw-fill" style="width:${pct}%;background:${color}"></div></div>
        <div class="nw-count" style="color:${color}">${c.nights} <span>night${c.nights === 1 ? '' : 's'}</span></div>
      </div>`;
  }).join('');
  const skipped = nw.no_winner
    ? `<div class="nw-foot">${nw.no_winner} night${nw.no_winner === 1 ? '' : 's'} tied &middot; ties count for nobody</div>`
    : '';
  return `
    <div class="nights-won">
      <div class="nights-won-title">⚔️ Nights won &middot; last 30 days</div>
      ${rows}
      ${skipped}
    </div>`;
}

function renderChampion(users) {
  const withAvg = users.filter(u => u.weekly_avg !== null && u.weekly_avg !== undefined);
  if (withAvg.length === 0) return '';
  const champ = withAvg.reduce((a, b) => b.weekly_avg > a.weekly_avg ? b : a);
  return `
    <div class="champion">
      <div class="champion-icon">🏆</div>
      <div>
        <div class="champion-label">7-day champion</div>
        <div class="champion-name">${dn(champ.name)}</div>
      </div>
      <div class="champion-avg">
        <div class="champion-avg-num">${champ.weekly_avg}</div>
        <div class="champion-avg-label">avg score</div>
      </div>
    </div>`;
}

function renderRow(u) {
  const i = u._rank;
  const latest = u.latest;

  // Check if the most recent entry in the window has no score yet
  const history = u.history || [];
  const newestEntry = history[history.length - 1];
  const awaitingSync = !newestEntry || newestEntry.score === null;

  if (!latest) {
    return `
      <div class="row">
        <div class="rank ${rankClass(i)}">${rankLabel(i)}</div>
        <div class="name-cell">
          <div class="name">${dn(u.name)}</div>
          <div class="date-line no-data">No data in last 7 days</div>
        </div>
        <div class="sparkline-cell">${sparklineSVG(history)}<span class="sparkline-label">7d</span></div>
        <div class="score-cell"><div class="score s-none">--</div></div>
      </div>`;
  }

  const total = latest.total || 1;
  const w = {
    deep: (latest.deep / total) * 100,
    rem: (latest.rem / total) * 100,
    light: (latest.light / total) * 100,
    awake: (latest.awake / total) * 100,
  };

  const weekly = u.weekly_avg != null
    ? `<div class="weekly-avg">7d avg <strong>${u.weekly_avg}</strong></div>`
    : '';

  // Movement vs previous night: find the scored entry before latest's date
  let deltaHTML = '';
  const scored = history.filter(d => d.score !== null && d.date <= latest.date);
  if (scored.length >= 2) {
    const prev = scored[scored.length - 2];
    const diff = latest.score - prev.score;
    if (diff > 0)      deltaHTML = `<div class="delta up">&#9650; ${diff}</div>`;
    else if (diff < 0) deltaHTML = `<div class="delta down">&#9660; ${Math.abs(diff)}</div>`;
    else               deltaHTML = `<div class="delta flat">&ndash; 0</div>`;
  }

  return `
    <div class="row rank-${i+1}" data-name="${u.name}">
      <div class="rank ${rankClass(i)}">${rankLabel(i)}</div>
      <div class="name-cell">
        <div class="name">${dn(u.name)}</div>
        ${awaitingSync
          ? '<div class="date-line"><span class="sync-badge">⏳ Not synced yet</span></div>'
          : `<div class="date-line">${sleepNightLabel(latest.date)} &middot; ${latest.total_str}</div>`
        }
      </div>
      <div class="sparkline-cell">
        ${sparklineSVG(u.history || [])}
        <span class="sparkline-label">7d</span>
      </div>
      <div class="score-cell">
        <div class="score ${awaitingSync ? 's-stale' : scoreClass(latest.quality)}">${latest.score}</div>
        <div class="quality ${latest.quality || ''}">${latest.quality || ''}</div>
        ${deltaHTML}
        ${weekly}
      </div>
      <div class="stages-bar">
        <div class="stage deep" style="width:${w.deep}%" title="Deep ${latest.deep_str}"></div>
        <div class="stage rem" style="width:${w.rem}%" title="REM ${latest.rem_str}"></div>
        <div class="stage light" style="width:${w.light}%" title="Light ${latest.light_str}"></div>
        <div class="stage awake" style="width:${w.awake}%" title="Awake ${latest.awake_str}"></div>
      </div>
      <div class="stage-legend">
        <span class="legend-item"><span class="legend-dot" style="background:var(--deep)"></span>Deep ${latest.deep_str} (${latest.deep_pct}%)</span>
        <span class="legend-item"><span class="legend-dot" style="background:var(--rem)"></span>REM ${latest.rem_str} (${latest.rem_pct}%)</span>
        <span class="legend-item"><span class="legend-dot" style="background:var(--light)"></span>Light ${latest.light_str} (${latest.light_pct}%)</span>
        <span class="legend-item"><span class="legend-dot" style="background:var(--awake)"></span>Awake ${latest.awake_str} (${latest.awake_pct}%)</span>
      </div>
      <div class="breakdown">
        <div class="stat"><span class="stat-label">Avg HR</span><span class="stat-value">${latest.avg_hr ?? '--'}</span><span class="stat-sub">resting ${latest.resting_hr ?? '--'}</span></div>
        <div class="stat"><span class="stat-label">HRV</span><span class="stat-value">${latest.avg_hrv ?? '--'}</span><span class="stat-sub">${latest.hrv_status ?? ''}</span></div>
        <div class="stat"><span class="stat-label">Stress</span><span class="stat-value">${latest.avg_stress ?? '--'}</span><span class="stat-sub">overnight avg</span></div>
        <div class="stat"><span class="stat-label">SpO2</span><span class="stat-value">${latest.avg_spo2 ?? '--'}%</span><span class="stat-sub">overnight avg</span></div>
        <div class="stat"><span class="stat-label">Respiration</span><span class="stat-value">${latest.avg_respiration ?? '--'}</span><span class="stat-sub">breaths/min</span></div>
        <div class="stat"><span class="stat-label">Body Battery</span><span class="stat-value">+${latest.body_battery_change ?? '--'}</span><span class="stat-sub">overnight gain</span></div>
      </div>
    </div>`;
}


// ---- Group switcher (shared pattern) ----
let GROUPS = {};
let CURRENT_GROUP = 'all';

function resolveGroup() {
  const h = location.hash.replace('#', '');
  if (h && (h === 'all' || GROUPS[h])) return h;
  try {
    const saved = localStorage.getItem('sleepGroup');
    if (saved && (saved === 'all' || GROUPS[saved])) return saved;
  } catch (e) {}
  return 'all';
}

function selectGroup(g) {
  CURRENT_GROUP = g;
  try { localStorage.setItem('sleepGroup', g); } catch (e) {}
  history.replaceState(null, '', g === 'all' ? location.pathname : '#' + g);
  document.querySelectorAll('.group-pill').forEach(p =>
    p.classList.toggle('active', p.dataset.group === g));
  renderForGroup();
}

function buildSwitcher(groups) {
  GROUPS = groups || {};
  const names = Object.keys(GROUPS).filter(g => (GROUPS[g] || []).length > 0);
  const el = document.getElementById('groupSwitch');
  if (!el || names.length === 0) { CURRENT_GROUP = 'all'; return; }
  el.classList.add('visible');
  el.innerHTML = ['all', ...names].map(g =>
    `<button class="group-pill" data-group="${g}">${g === 'all' ? 'All' : g}</button>`
  ).join('');
  el.querySelectorAll('.group-pill').forEach(p =>
    p.addEventListener('click', () => selectGroup(p.dataset.group)));
  CURRENT_GROUP = resolveGroup();
  el.querySelectorAll('.group-pill').forEach(p =>
    p.classList.toggle('active', p.dataset.group === CURRENT_GROUP));
}

function filterByGroup(users) {
  if (CURRENT_GROUP === 'all') return users;
  const members = GROUPS[CURRENT_GROUP] || [];
  return users.filter(u => members.includes(u.name));
}

let DATA = null;

function renderForGroup() {
  if (!DATA) return;
  let users = filterByGroup(DATA.users || []);

  // Competition ranking within the visible set: ties share a rank
  let lastScore = null, lastRank = 0;
  users.forEach((u, i) => {
    const s = u.latest ? u.latest.score : null;
    if (s !== null && s === lastScore) {
      u._rank = lastRank;
    } else {
      u._rank = i;
      lastRank = i;
      lastScore = s;
    }
  });

  document.getElementById('board').innerHTML = users.length
    ? users.map(renderRow).join('')
    : `<div style="color:var(--muted);font-size:13px;padding:24px 0">No members in this group yet.</div>`;

  // Awards: per-group from server when a group is selected, else overall
  let spoon = DATA.wooden_spoon || null;
  let streak = DATA.longest_streak || null;
  let nightsWon = DATA.nights_won || null;
  if (CURRENT_GROUP !== 'all' && DATA.group_awards && DATA.group_awards[CURRENT_GROUP]) {
    spoon = DATA.group_awards[CURRENT_GROUP].wooden_spoon || null;
    streak = DATA.group_awards[CURRENT_GROUP].longest_streak || null;
    nightsWon = DATA.group_awards[CURRENT_GROUP].nights_won || null;
  }
  const weekHTML = renderChampion(users);
  const monthHTML = renderWoodenSpoon(spoon) + renderStreak(streak) + renderNightsWon(nightsWon);
  document.getElementById('weekWrap').innerHTML = weekHTML;
  document.getElementById('monthWrap').innerHTML = monthHTML;
  document.getElementById('weekLabel').style.display = weekHTML.trim() ? '' : 'none';
  document.getElementById('monthLabel').style.display = monthHTML.trim() ? '' : 'none';

  document.querySelectorAll('.row[data-name]').forEach(row => {
    row.addEventListener('click', () => row.classList.toggle('expanded'));
  });
}

async function load() {
  try {
    const res = await fetch('scores.json');
    if (!res.ok) throw new Error(`scores.json not found (${res.status})`);
    DATA = await res.json();

    document.getElementById('updatedAt').textContent =
      DATA.updated_at ? `Updated ${DATA.updated_at.replace('T', ' ')}` : '';

    buildSwitcher(DATA.groups);
    renderForGroup();
  } catch (e) {
    document.getElementById('board').innerHTML =
      `<div style="color:#5a7080;font-size:13px;padding:24px 0">Could not load scores.json: ${e.message}</div>`;
  }
}

load();
</script>
