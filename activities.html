<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Activity Stats</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Mono:ital,wght@0,300;0,400;0,500;1,400&family=DM+Sans:wght@400;500;600;700&display=swap');

  :root {
    --bg: #080c10;
    --surface: #0e1318;
    --card: #131920;
    --card-hover: #171f28;
    --border: #1e2832;
    --border-bright: #2a3844;
    --text: #dce8f0;
    --muted: #5a7080;
    --dim: #3a5060;
    --accent: #4fa8d0;
    --run: #3dd68c;
    --cycle: #e8c547;
    --swim: #4fa8d0;
    --steps: #a78bfa;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding: 40px 16px 80px;
    line-height: 1.5;
    background-image:
      radial-gradient(ellipse 80% 40% at 50% -10%, rgba(79,168,208,0.05) 0%, transparent 60%);
  }

  .wrap { max-width: 860px; margin: 0 auto; }

  /* Nav */
  .nav {
    display: flex;
    gap: 6px;
    margin-bottom: 32px;
  }
  .nav a {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    text-decoration: none;
    padding: 6px 14px;
    border-radius: 6px;
    border: 1px solid var(--border);
    color: var(--muted);
    transition: all 0.12s;
  }
  .nav a:hover { border-color: var(--border-bright); color: var(--text); }
  .nav a.active { background: var(--card); border-color: var(--accent); color: var(--accent); }

  /* Header */
  header { margin-bottom: 32px; }
  h1 {
    font-size: 26px;
    font-weight: 700;
    letter-spacing: -0.03em;
  }
  h1 span { color: var(--accent); }
  .updated {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: var(--muted);
    margin-top: 6px;
  }
  .period {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: var(--dim);
    margin-top: 3px;
  }

  /* Group switcher */
  .group-switch { display: none; flex-wrap: wrap; gap: 6px; margin: -16px 0 24px; }
  .group-switch.visible { display: flex; }
  .group-pill {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    cursor: pointer;
    padding: 5px 12px;
    border-radius: 14px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--muted);
    transition: all 0.12s;
  }
  .group-pill:hover { border-color: var(--border-bright); color: var(--text); }
  .group-pill.active { background: var(--accent); border-color: var(--accent); color: #08111a; }

  /* Steps leader */
  .steps-leader {
    background: linear-gradient(135deg, rgba(167,139,250,0.1) 0%, rgba(167,139,250,0.03) 100%);
    border: 1px solid rgba(167,139,250,0.25);
    border-radius: 12px;
    padding: 16px 20px;
    margin-bottom: 14px;
    display: flex;
    align-items: center;
    gap: 16px;
  }
  .steps-leader-icon { font-size: 26px; line-height: 1; flex-shrink: 0; }
  .steps-leader-label {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--steps);
    margin-bottom: 3px;
  }
  .steps-leader-name {
    font-size: 20px;
    font-weight: 700;
    text-transform: capitalize;
    color: var(--text);
    letter-spacing: -0.02em;
  }
  .steps-leader-right { margin-left: auto; text-align: right; flex-shrink: 0; }
  .steps-leader-count {
    font-family: 'DM Mono', monospace;
    font-size: 28px;
    font-weight: 700;
    color: var(--steps);
    line-height: 1;
  }
  .steps-leader-sub {
    font-size: 10px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.08em;
    margin-top: 2px;
  }
  .steps-chart {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 16px 18px;
    margin-bottom: 24px;
  }
  .sc-row { display: flex; align-items: center; gap: 12px; margin-bottom: 12px; }
  .sc-row:last-child { margin-bottom: 0; }
  .sc-name {
    width: 84px;
    flex-shrink: 0;
    font-size: 13px;
    font-weight: 600;
    text-transform: capitalize;
    text-align: right;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .sc-track { flex: 1; height: 22px; background: var(--surface); border-radius: 6px; overflow: hidden; }
  .sc-fill { height: 100%; border-radius: 6px; transition: width 0.4s ease; }
  .sc-count {
    width: 64px;
    flex-shrink: 0;
    font-family: 'DM Mono', monospace;
    font-size: 13px;
    font-weight: 600;
  }

  /* User cards */
  .cards { display: flex; flex-direction: column; gap: 16px; }

  .card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    overflow: hidden;
  }

  .card-header {
    padding: 16px 20px 14px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: baseline;
    gap: 10px;
  }
  .card-name {
    font-size: 17px;
    font-weight: 700;
    text-transform: capitalize;
    letter-spacing: -0.01em;
  }

  /* Stats grid */
  .stats-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    divide: horizontal;
  }

  .stat-block {
    padding: 18px 20px;
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    gap: 6px;
  }
  .stat-block:last-child { border-right: none; }

  .stat-icon {
    font-size: 18px;
    line-height: 1;
    margin-bottom: 2px;
  }
  .stat-label {
    font-size: 9px;
    font-weight: 600;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--muted);
    font-family: 'DM Mono', monospace;
  }
  .stat-value {
    font-size: 26px;
    font-weight: 700;
    line-height: 1;
    font-family: 'DM Mono', monospace;
    letter-spacing: -0.02em;
  }
  .stat-value.steps { color: var(--steps); }
  .stat-value.run   { color: var(--run); }
  .stat-value.cycle { color: var(--cycle); }
  .stat-value.swim  { color: var(--swim); }
  .stat-value.none  { color: var(--dim); }

  .stat-unit {
    font-size: 11px;
    color: var(--muted);
    margin-top: 2px;
  }
  .stat-sub {
    font-size: 11px;
    color: var(--dim);
    font-family: 'DM Mono', monospace;
  }

  footer {
    margin-top: 48px;
    text-align: center;
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: var(--dim);
    letter-spacing: 0.04em;
  }

  @media (max-width: 580px) {
    .stats-grid {
      grid-template-columns: repeat(2, 1fr);
    }
    .stat-block:nth-child(2) { border-right: none; }
    .stat-block:nth-child(1),
    .stat-block:nth-child(2) { border-bottom: 1px solid var(--border); }
    .stat-value { font-size: 22px; }
  }
</style>
</head>
<body>
<div class="wrap">
  <nav class="nav">
    <a href="index.html">Sleep</a>
    <a href="activities.html" class="active">Activity</a>
    <a href="history.html">History</a>
  </nav>

  <header>
    <h1>Weekly <span>Activity</span></h1>
    <div class="updated" id="updatedAt">Loading...</div>
    <div class="period" id="period"></div>
  </header>

  <div id="groupSwitch" class="group-switch"></div>

  <div id="stepsLeader"></div>

  <div id="cards" class="cards"></div>

  <footer>Garmin Connect &middot; data updated manually</footer>
</div>

<script>
function fmt(val, decimals = 1) {
  if (val === null || val === undefined) return null;
  return decimals === 0 ? Math.round(val).toLocaleString() : val.toFixed(decimals);
}

function sessionLabel(n, type) {
  if (!n) return `no ${type}s`;
  return `${n} session${n === 1 ? '' : 's'}`;
}

function dn(name) {
  const m = (DATA && DATA.display_names) || {};
  return m[name] || name.replace(/_/g, ' ');
}

function fmtK(n) {
  if (n >= 1000) return (n / 1000).toFixed(1).replace(/\.0$/, '') + 'k';
  return String(n);
}

function renderStepsLeader(users) {
  const withSteps = users.filter(u => (u.weekly_steps || 0) > 0);
  if (!withSteps.length) return '';
  const sorted = withSteps.slice().sort((a, b) => (b.weekly_steps || 0) - (a.weekly_steps || 0));
  const leader = sorted[0];
  const max = leader.weekly_steps || 1;
  const palette = ['#a78bfa', '#4fa8d0', '#3dd68c', '#e8c547', '#f0997b', '#ed93b1'];

  const banner = `
    <div class="steps-leader">
      <div class="steps-leader-icon">👣</div>
      <div>
        <div class="steps-leader-label">Step leader · this week</div>
        <div class="steps-leader-name">${dn(leader.name)}</div>
      </div>
      <div class="steps-leader-right">
        <div class="steps-leader-count">${(leader.weekly_steps || 0).toLocaleString()}</div>
        <div class="steps-leader-sub">steps</div>
      </div>
    </div>`;

  const rows = sorted.map((u, i) => {
    const pct = Math.round(((u.weekly_steps || 0) / max) * 100);
    const color = palette[i % palette.length];
    return `
      <div class="sc-row">
        <div class="sc-name">${dn(u.name)}</div>
        <div class="sc-track"><div class="sc-fill" style="width:${pct}%;background:${color}"></div></div>
        <div class="sc-count" style="color:${color}">${fmtK(u.weekly_steps || 0)}</div>
      </div>`;
  }).join('');

  return banner + `<div class="steps-chart">${rows}</div>`;
}

function renderCard(u) {
  const steps = u.weekly_steps;
  const avgSteps = u.avg_daily_steps;
  const runKm = u.running_km;
  const cycleKm = u.cycling_km;
  const swimKm = u.swimming_km;

  function statBlock(icon, label, value, unit, sub, colorClass) {
    const displayVal = value !== null && value !== undefined && value !== 0
      ? value
      : null;
    return `
      <div class="stat-block">
        <div class="stat-icon">${icon}</div>
        <div class="stat-label">${label}</div>
        <div class="stat-value ${displayVal !== null ? colorClass : 'none'}">
          ${displayVal !== null ? displayVal : '--'}
        </div>
        <div class="stat-unit">${unit}</div>
        <div class="stat-sub">${sub}</div>
      </div>`;
  }

  const stepsDisplay = steps ? Math.round(steps).toLocaleString() : null;
  const avgDisplay = avgSteps ? Math.round(avgSteps).toLocaleString() + ' /day' : 'no data';

  return `
    <div class="card">
      <div class="card-header">
        <div class="card-name">${dn(u.name)}</div>
      </div>
      <div class="stats-grid">
        ${statBlock('👣', 'Steps', stepsDisplay, '7-day total', avgDisplay, 'steps')}
        ${statBlock('🏃', 'Running', runKm ? runKm.toFixed(1) : null, 'km this week', sessionLabel(u.running_sessions, 'run'), 'run')}
        ${statBlock('🚴', 'Cycling', cycleKm ? cycleKm.toFixed(1) : null, 'km this week', sessionLabel(u.cycling_sessions, 'ride'), 'cycle')}
        ${statBlock('🏊', 'Swimming', swimKm ? swimKm.toFixed(1) : null, 'km this week', sessionLabel(u.swimming_sessions, 'swim'), 'swim')}
      </div>
    </div>`;
}

function getPeriodLabel() {
  const today = new Date();
  const start = new Date(today);
  start.setDate(start.getDate() - 6);
  const fmt = d => d.toLocaleDateString(undefined, { month: 'short', day: 'numeric' });
  return `${fmt(start)} – ${fmt(today)}`;
}


// ---- Group switcher (shared pattern) ----
let GROUPS = {};
let CURRENT_GROUP = 'all';

function resolveGroup() {
  const h = location.hash.replace('#', '');
  if (h && (h === 'all' || GROUPS[h])) return h;
  try {
    const saved = localStorage.getItem('sleepGroup');
    if (saved && (saved === 'all' || GROUPS[saved])) return saved;
  } catch (e) {}
  return 'all';
}

function selectGroup(g) {
  CURRENT_GROUP = g;
  try { localStorage.setItem('sleepGroup', g); } catch (e) {}
  history.replaceState(null, '', g === 'all' ? location.pathname : '#' + g);
  document.querySelectorAll('.group-pill').forEach(p =>
    p.classList.toggle('active', p.dataset.group === g));
  renderForGroup();
}

function buildSwitcher(groups) {
  GROUPS = groups || {};
  const names = Object.keys(GROUPS).filter(g => (GROUPS[g] || []).length > 0);
  const el = document.getElementById('groupSwitch');
  if (!el || names.length === 0) { CURRENT_GROUP = 'all'; return; }
  el.classList.add('visible');
  el.innerHTML = ['all', ...names].map(g =>
    `<button class="group-pill" data-group="${g}">${g === 'all' ? 'All' : g}</button>`
  ).join('');
  el.querySelectorAll('.group-pill').forEach(p =>
    p.addEventListener('click', () => selectGroup(p.dataset.group)));
  CURRENT_GROUP = resolveGroup();
  el.querySelectorAll('.group-pill').forEach(p =>
    p.classList.toggle('active', p.dataset.group === CURRENT_GROUP));
}

function filterByGroup(users) {
  if (CURRENT_GROUP === 'all') return users;
  const members = GROUPS[CURRENT_GROUP] || [];
  return users.filter(u => members.includes(u.name));
}

let DATA = null;

function renderForGroup() {
  if (!DATA) return;
  const users = filterByGroup(DATA.users || []);
  document.getElementById('stepsLeader').innerHTML = renderStepsLeader(users);
  document.getElementById('cards').innerHTML = users.length
    ? users.map(renderCard).join('')
    : `<div style="color:var(--muted);font-size:13px;padding:24px 0">No members in this group yet.</div>`;
}

async function load() {
  try {
    const res = await fetch('activities.json');
    if (!res.ok) throw new Error(`activities.json not found (${res.status})`);
    DATA = await res.json();

    document.getElementById('updatedAt').textContent =
      DATA.updated_at ? `Updated ${DATA.updated_at.replace('T', ' ')}` : '';
    document.getElementById('period').textContent = getPeriodLabel();

    buildSwitcher(DATA.groups);
    renderForGroup();
  } catch (e) {
    document.getElementById('cards').innerHTML =
      `<div style="color:var(--muted);font-size:13px;padding:24px 0">Could not load activities.json: ${e.message}</div>`;
  }
}

load();
</script>
</body>
</html>
